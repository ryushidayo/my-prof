<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ページの説明をここに記入" />
  <title>プロフィール</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/reset.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <!-- 案3：ダイアゴナル・スライド・オープニング演出 -->
  <div id="diagonal-loader">
    <div class="panel-top"></div>
    <div class="panel-bottom"></div>
    <div class="loader-text">ACCESS GRANTED</div>
  </div>

  <!-- メインコンテンツをラップ -->
  <div id="page-content">
    <header id="site-header">
      <div class="header-container">
        <div class="logo">
          <a href="{{ url_for('index') }}">RYUSHI<span>.dev</span></a>
        </div>
        <nav>
          <ul class="nav-links">
            <li><a href="#main-content">About</a></li>
            <li><a href="#skills">Skills</a></li>
            <li><a href="https://github.com/ryushidayo" target="_blank" class="github-link">GitHub</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main id="main-content">
      <div class="profile-card">
        <h1>ようこそ</h1>
        <p>
          <strong>name:</strong> ryushi <br>
          <strong>age:</strong> 16 <br>
          <strong>birthday:</strong> 2010/02/01 <br>
          <strong>hobbys:</strong> programming, game(minecraft,etc...)
        </p>

        <div id="skills" class="skills-section">
          <h2>Skills</h2>
          <div class="skill-item">
            <span class="skill-name">Python / Flask</span>
            <div class="skill-bar"><div class="skill-progress" style="--p: 85%;"></div></div>
          </div>
          <div class="skill-item">
            <span class="skill-name">HTML / CSS</span>
            <div class="skill-bar"><div class="skill-progress" style="--p: 90%;"></div></div>
          </div>
          <div class="skill-item">
            <span class="skill-name">Game Dev</span>
            <div class="skill-bar"><div class="skill-progress" style="--p: 30%;"></div></div>
          </div>
        </div>
      </div>
    </main>

    <!-- 波のアニメーション (フッター用) -->
    <div class="wave-container">
      <svg class="waves" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
      viewBox="0 24 150 28" preserveAspectRatio="none" shape-rendering="auto">
        <defs>
          <path id="gentle-wave" d="M-160 44c30 0 58-18 88-18s 58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z" />
        </defs>
        <g class="parallax">
          <use xlink:href="#gentle-wave" x="48" y="0" fill="rgba(14, 165, 233, 0.3)" />
          <use xlink:href="#gentle-wave" x="48" y="3" fill="rgba(34, 211, 238, 0.2)" />
          <use xlink:href="#gentle-wave" x="48" y="5" fill="rgba(14, 165, 233, 0.1)" />
          <use xlink:href="#gentle-wave" x="48" y="7" fill="var(--color-bg)" />
        </g>
      </svg>
    </div>

    <footer id="site-footer">
      <p>&copy; 2026 RYUSHI.dev</p>
    </footer>
  </div>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  <script>
    // ダイアゴナル・スライド演出の制御
    window.addEventListener('DOMContentLoaded', () => {
      const loader = document.getElementById('diagonal-loader');
      const content = document.getElementById('page-content');
      
      // 1.5秒後にコンテンツを表示
      setTimeout(() => {
        loader.classList.add('fade-out');
        content.classList.add('show');
        
        setTimeout(() => {
          loader.remove();
        }, 1000);
      }, 1500);
    });
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
